name: Release Build

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Linux builds
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            suffix: linux-x86_64
          - target: aarch64-unknown-linux-gnu
            suffix: linux-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build ivlan-cli
        run: cross build -p ivlan-cli --release --target ${{ matrix.target }}

      - name: Build ivland
        run: cross build -p ivland --release --target ${{ matrix.target }}

      - name: Package binaries
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/ivlan dist/ivlan
          cp target/${{ matrix.target }}/release/ivland dist/ivland
          strip dist/ivlan || true
          strip dist/ivland || true
          tar -czf ${{ matrix.suffix }}.tar.gz -C dist .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.suffix }}
          path: ${{ matrix.suffix }}.tar.gz

  build-macos:
    name: macOS builds
    runs-on: macos-14

    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            suffix: macos-x86_64
          - target: aarch64-apple-darwin
            suffix: macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build ivlan-cli
        run: cargo build -p ivlan-cli --release --target ${{ matrix.target }}

      - name: Build ivland
        run: cargo build -p ivland --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/ivlan dist/ivlan
          cp target/${{ matrix.target }}/release/ivland dist/ivland
          strip dist/ivlan || true
          strip dist/ivland || true
          tar -czf ${{ matrix.suffix }}.tar.gz -C dist .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.suffix }}
          path: ${{ matrix.suffix }}.tar.gz

  release:
    name: Publish GitHub Release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}